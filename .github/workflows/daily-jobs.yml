name: Daily Jobs

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update jobs feed
        run: node ./scripts/update-jobs.mjs

      - name: Commit refreshed jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: refresh jobs feed"
          git push

      - name: Send email summary
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node ./scripts/send-email.mjs

      - name: Send WeCom summary
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node ./scripts/send-wechat.mjs
