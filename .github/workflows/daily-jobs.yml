name: Daily Jobs

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Chicago run window
        id: gate
        env:
          TARGET_HOUR: 9
          TARGET_MINUTE: 0
          BUFFER_MINUTES: 20
        run: node ./scripts/should-run-daily.mjs

      - name: Update jobs feed
        if: steps.gate.outputs.should_run == 'true'
        run: node ./scripts/update-jobs.mjs

      - name: Commit refreshed jobs
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: refresh jobs feed"
          git push

      - name: Send Telegram summary
        if: steps.gate.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node ./scripts/send-telegram.mjs

      - name: Send WeCom summary
        if: steps.gate.outputs.should_run == 'true'
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node ./scripts/send-wechat.mjs
